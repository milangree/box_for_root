#!/system/bin/sh

# ════════════════════
# Box for Root - 配置文件
# ════════════════════

# 系统初始化：检查 busybox 并设置环境变量
if ! command -v busybox &> /dev/null; then
  export PATH="/data/adb/magisk:/data/adb/ksu/bin:/data/adb/ap/bin:$PATH:/system/bin"
fi

# ════════════════════
# 核心路径配置 (请勿修改)
# ════════════════════

box_dir="/data/adb/box"
box_run="${box_dir}/run"
box_run_state="${box_run}/state"
box_run_locks="${box_run}/locks"

mkdir -p "${box_run_state}" "${box_run_locks}" >/dev/null 2>&1 || true

box_log="${box_run}/runs.log"
box_pid="${box_run}/box.pid"
bin_dir="${box_dir}/bin"
system_packages_file="/data/system/packages.list"
uid_list="${box_run_state}/appuid.list"

# ════════════════════
# 基础设置
# ════════════════════

# 开机自启
boot_auto_start="true"
current_time=$(date +"%H:%M")
box_user_group="root:net_admin"

# ════════════════════
# 代理核心配置
# ════════════════════

bin_name="mihomo"
bin_list=("mihomo" "sing-box" "xray" "v2fly" "hysteria")
bin_path="${bin_dir}/${bin_name}"
bin_log="${box_run}/${bin_name}.log"

# 启动时自动修改核心配置文件
auto_modify_config="true"

# ════════════════════
# 网络配置
# ════════════════════

# 网络模式: tun / tproxy / redirect / mixed / enhance
network_mode="tun"
tproxy_port="9898"
redir_port="9797"
ipv6="true"

quic="enable"
mihomo_dns_forward="enable"

proxy_tcp="true"
proxy_udp="true"

dns_hijack_tcp="true"
dns_hijack_udp="true"

# DNS 劫持策略: disable / tproxy/ redirect
dns_hijack_mode="tproxy"

# 绕过大陆 IP（需要设备支持 ipset）
bypass_cn_ip="false"
bypass_cn_ip_v4="false"
bypass_cn_ip_v6="false"
cn_ip_file="${box_run_state}/cn_ip.txt"
cn_ipv6_file="${box_run_state}/cn_ipv6.txt"
cn_ip_url="https://ispip.clang.cn/all_cn.txt"
cn_ipv6_url="https://ispip.clang.cn/all_cn_ipv6.txt"

# 热点场景 MAC 黑白名单（仅对热点/入站接口生效，默认关闭）
mac_filter="false"
mac_mode="blacklist"
macs_list=()

# ════════════════════
# 代理模式配置
# ════════════════════

# 代理模式: blacklist (黑名单) / whitelist (白名单) / core (核心模式)
proxy_mode="core"

# ════════════════════
# 订阅管理
# ════════════════════

# Mihomo 订阅链接数组
subscription_url_mihomo=()
# Mihomo 订阅配置文件名数组
name_provide_mihomo_config=()
# Mihomo 订阅文件存放目录
mihomo_provide_path="${box_dir}/mihomo/proxy_provider"

# 是否支持订阅中的自定义规则
custom_rules_subs="false"
name_provide_mihomo_rules="rules.yaml"
mihomo_provide_rules="${box_dir}/mihomo/provide/${name_provide_mihomo_rules}"

# Sing-box 订阅链接
subscription_url_singbox=""

# ════════════════════
# 网络状态控制
# ════════════════════

# 是否根据网络状态自动控制服务（总开关）
enable_network_service_control="false"
# WiFi 连接时是否启用模块
use_module_on_wifi="true"
# WiFi 断开时是否启用模块
use_module_on_wifi_disconnect="true"
# 是否启用 WiFi 匹配（SSID/BSSID）
use_ssid_matching="false"
# SSID 匹配模式: blacklist (黑名单) / whitelist (白名单)
use_wifi_list_mode="blacklist"
# WiFi SSID 列表
wifi_ssids_list=("WiFi1" "WiFi2")
# WiFi BSSID 列表
wifi_bssids_list=()
# 是否启用网络切换调试日志
inotify_log_enabled="true"

# ════════════════════
# 性能优化
# ════════════════════

# 内存限制
cgroup_memcg="false"
memcg_limit="100M"
# CPU 核心分配
cgroup_cpuset="true"
allow_cpu="0-5"
# 磁盘 I/O 权重
cgroup_blkio="false"
weight=""

# ════════════════════
# 核心配置文件路径
# ════════════════════

# Mihomo 配置文件
name_mihomo_config="config.yaml"
mihomo_config="${box_dir}/mihomo/${name_mihomo_config}"

# Sing-box 配置文件
name_sing_config="config.json"
sing_config="${box_dir}/sing-box/${name_sing_config}"

# Xray 配置文件
name_xray_config="config.json"
xray_config="${box_dir}/xray/${name_xray_config}"

# V2fly 配置文件
name_v2fly_config="config.json"
v2fly_config="${box_dir}/v2fly/${name_v2fly_config}"

# Hysteria 配置文件
name_hysteria_config="config.yaml"
hysteria_config="${box_dir}/hysteria/${name_hysteria_config}"

# ════════════════════
# 自动更新配置
# ════════════════════

# true: 覆盖配置文件, false: 只更新订阅
renew="false"
# 是否启用订阅自动更新
update_subscription="true"
# 是否启用 GeoX 数据自动更新
update_geo="false"

# 是否启用定时任务
run_crontab="true"
# 定时任务时间
interva_update="0 0,6,12,18 * * *"

# ════════════════════
# 监控守护配置 (box.monitor)
# ════════════════════

# ── 无网络自动重启
# 每隔 network_check_interval 秒检测一次，连续失败 N 次后自动重启核心
enable_network_watchdog="true"
# 检测间隔（秒），最小 10s
network_check_interval="60"
# 连续失败次数阈值
network_watchdog_timeout="5"
# HTTP 检测目标
network_test_host="https://cp.cloudflare.com"

# ── runs.log 输出过滤（仅针对 CPU 和网络监控，不影响 monitor.log）──────
# all     — 写入全部日志（Info / Warning / Error）
# warning — 仅写入 Warning 和 Error
# error   — 仅写入 Error
# none    — 不写入 runs.log
monitor_runs_log_level="warning"

# ── 重启日志（restart.log）
# restart.log 持续追加，不随每次启动备份轮换
# true  — 每次写入后清空 restart.log（只保留本次记录）
# false — 持续追加，不自动清除（默认）
clear_restart_log="false"

# ── CPU 占用过高自动重启 
# 检测核心进程 CPU 占用，持续超标则重启
enable_cpu_watchdog="true"
# 触发阈值（%），超过此值开始计时
cpu_watchdog_threshold="90"
# 持续超标秒数达到此值后重启
cpu_watchdog_duration="120"

# ── 定时重启核心 
# 按 cron 表达式定时重启核心（独立于 run_crontab）
enable_scheduled_restart="false"
# cron 表达式（默认每天凌晨 4:00）
scheduled_restart_cron="0 4 * * *"

# 启动时清理 ColorOS/OxygenOS 等系统注入的 Google 防火墙 REJECT 规则
# true: 自动清理 fw_INPUT/fw_OUTPUT 链中的 REJECT 规则（推荐开启，解决特定机型代理失效问题）
# false: 跳过清理，对非 ColorOS 设备可关闭以节省启动时间
clean_gfw_rules="false"

# ════════════════════
# 下载设置
# ════════════════════

# GitHub 访问令牌
githubtoken=""
# 是否使用镜像加速 GitHub 下载
use_ghproxy="true"
# 镜像加速地址
url_ghproxy="https://v6.gh-proxy.org/"

# 核心版本: enable (稳定版) / disable (预发行版)
mihomo_stable="enable"
singbox_stable="enable"

# ════════════════════
# 代理规则配置（请勿修改）
# ════════════════════

write_listap="${box_dir}/ap.list.cfg"
pkg_config="${box_dir}/package.list.cfg"
gid_config="${box_dir}/gid.list.cfg"
[ ! -f "${write_listap}" ] && touch "${write_listap}"
[ ! -f "${pkg_config}" ] && touch "${pkg_config}"
[ ! -f "${gid_config}" ] && touch "${gid_config}"

prefixed_list=($(sed -n '/^[0-9][0-9]*:/p' "${pkg_config}"))
unprefixed_list_converted=($(sed -n '/\./p' "${pkg_config}" | grep -v -E '^[0-9]+:|^[0-9]+$|^[[:space:]]*#' | sed 's/^/0:/'))
packages_list=("${prefixed_list[@]}" "${unprefixed_list_converted[@]}")
gid_list=($(busybox awk '!/^#/ && /^[0-9]+$/ {print $1}' "${gid_config}"))

ap_list=($(busybox awk '/^allow / {print $2}' "${write_listap}"))
ignore_ap_list=($(busybox awk '/^ignore / {print $2}' "${write_listap}"))

# ════════════════════
# 日志系统开关
# ════════════════════

# box.service 日志过滤（控制 Debug/Info 等级别写入 runs.log 的策略）
# all     — 写入全部日志（Info / Debug / Warning / Error）
# nodebug — 过滤 Debug，只写 Info / Warning / Error
# warning — 仅写入 Warning 和 Error
# error   — 仅写入 Error
# none    — 不写入 runs.log
service_log_filter="debug"

# runs.log 最大行数（超过后保留末尾 N 行），0 表示不限制
runs_log_max_lines="1000"
# monitor.log 最大行数
monitor_log_max_lines="500"
# restart.log 最大行数
restart_log_max_lines="200"

# ════════════════════
# 日志系统（请勿修改）
# ════════════════════

log() {
  local normal="\033[0m"
  local red="\033[1;31m"
  local green="\033[1;32m"
  local yellow="\033[1;33m"
  local blue="\033[1;34m"
  local cyan="\033[1;36m"
  local color

  case $1 in
    Info)    color="${blue}"   ;;
    Error)   color="${red}"    ;;
    Warning) color="${yellow}" ;;
    Debug)   color="${cyan}"   ;;
    *)       color="${green}"  ;;
  esac

  # 每次调用都取当前时间，避免使用 source 时固化的 current_time
  local _ts
  _ts="$(date '+%Y-%m-%d %H:%M:%S')"
  local message="${_ts} [$1]: $2"

  if [ -t 1 ]; then
    echo -e "${color}${message}${normal}"
  else
    # 按 service_log_filter 过滤写入 runs.log
    # all(默认) / nodebug / warning / error / none
    local _filter="${service_log_filter:-all}"
    local _do_write=true
    case "${_filter}" in
      all)     _do_write=true ;;
      nodebug) [ "$1" = "Debug" ] && _do_write=false ;;
      warning) [ "$1" != "Warning" ] && [ "$1" != "Error" ] && _do_write=false ;;
      error)   [ "$1" != "Error" ] && _do_write=false ;;
      none)    _do_write=false ;;
    esac
    [ "${_do_write}" = "true" ] && echo "${message}" | tee -a "${box_log}"
  fi

  if [[ $TOAST ]]; then
    true
  fi
}

